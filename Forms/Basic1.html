<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Basic Form</title>
</head>
<body>
    
    <div class="Main-border">
        <div class="header">
            <h1>Hiraya Log-in</h1>
        </div>
        <div class="Form">
            <input type="text" class="customize" id="UName" placeholder="Username" onclick="login()" maxlength="25">
            <input type="text" class="customize" placeholder="Gmail" maxlength="25">
            <input type="password" class="customize" placeholder="Password" maxlength="25">
        </div>
        <div class="Frmbtn">
            <input type="button" class="Frmbtn-bt" placeholder="Log-in" value="Log-in">
            <input type="button"  class="Frmbtn-bt" placeholder="Sign-in" value="Sign-in">
        </div>
    </div>

    <script src="function.js"></script>
</body>
</html>
